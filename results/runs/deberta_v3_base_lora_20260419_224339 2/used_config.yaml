data:
  data_cfg: configs/data.yaml
logging:
  run_name: deberta_v3_base_lora
  save_dir: results/runs
lora:
  lora_alpha: 32
  lora_dropout: 0.1
  r: 16
  target_modules:
  - query_proj
  - key_proj
  - value_proj
  - dense
model:
  max_length: 512
  name: microsoft/deberta-v3-base
  num_labels: 9
training:
  epochs: 6
  eval_batch_size: 32
  gamma: 2.0
  gradient_accumulation_steps: 2
  learning_rate: 8e-5
  output_dir: models/checkpoints/
  seed: 42
  threshold: 0.25
  train_batch_size: 8
  warmup_ratio: 0.1
  weight_decay: 0.01
